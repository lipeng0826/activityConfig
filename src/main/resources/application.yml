server:
  port: 8080

spring:
  profiles:
    active: dev

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: Y29tLmJvb2tvcmRlci5ib29rLW9yZGVyLXN5c3RlbS1qd3Qtc2VjcmV0LWtleS0yMDI0
  expiration: 86400000

logging:
  level:
    com.bookorder: debug

---
# ========== dev 环境：H2 内存数据库（无需安装 MySQL） ==========
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:book_order;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init.sql

---
# ========== mysql 环境：需要安装 MySQL 并建库 ==========
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://localhost:3306/book_order?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init-mysql.sql
